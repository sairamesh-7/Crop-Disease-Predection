<!DOCTYPE html>
<html>

<head>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<title>{{ text.feedback if text else "Feedback" }}</title>

<style>

/* 🔥 CENTER FIX */
.container{
    max-width:600px;
    margin:auto;
    text-align:center;
}

/* 🔥 TEXTAREA */
textarea{
    width:100%;
    height:120px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    resize:none;
}

/* ⭐ RATING FIX */
.rating-group{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:10px;
    align-items:flex-start;
}

.rating-option{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    cursor:pointer;
}

.rating-option input{
    transform:scale(1.2);
    cursor:pointer;
}

/* 🔥 BUTTON */
.main-btn{
    width:100%;
    padding:12px;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.main-btn:hover{
    background:#27ae60;
}

</style>

</head>

<body>

<div class="container">

    <!-- 🔥 TITLE -->
    <h2>{{ text.feedback if text else "Feedback" }}</h2>

    <!-- 🔥 FORM -->
    <form action="/submit_feedback" method="POST">

        <!-- 🔥 COMMENT -->
        <textarea 
            name="comment"
            placeholder="{{ text.feedback if text else 'Your comments...' }}"
            required>
        </textarea>

        <br><br>

        <!-- ⭐ RATING -->
        <div style="text-align:left;">
            <label style="font-weight:600;">
                ⭐ {{ text.get('rating','Rate your experience') }}
            </label>

            <div class="rating-group">

                <label class="rating-option">
                    <input type="radio" name="rating" value="5" required> ⭐⭐⭐⭐⭐                </label>

                <label class="rating-option">
                    <input type="radio" name="rating" value="4"> ⭐⭐⭐⭐                </label>

                <label class="rating-option">
                    <input type="radio" name="rating" value="3"> ⭐⭐⭐                </label>

                <label class="rating-option">
                    <input type="radio" name="rating" value="2"> ⭐⭐                </label>

                <label class="rating-option">
                    <input type="radio" name="rating" value="1"> ⭐                </label>

            </div>
        </div>

        <br>

        <!-- 🔥 SUBMIT -->
        <button type="submit" class="main-btn">
            {{ text.submit if text else "Submit" }}
        </button>

    </form>

</div>

</body>
</html>
