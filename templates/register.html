<!DOCTYPE html>

<html>

<head>

<title>Create Account</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form action="/register_user" method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required

>

<br><br>

<input
type="email"
name="email"
placeholder="Email"
required

>

<br><br>

<input
type="text"
name="phone"
placeholder="Phone"
required

>

<br><br>

<input
type="password"
name="password"
placeholder="Password"
required

>

<br><br>

<button type="submit">
Create Account
</button>

</form>

<br>

<a href="/login">

<button type="button">
Back to Login
</button>

</a>

</div>

</body>

</html>
